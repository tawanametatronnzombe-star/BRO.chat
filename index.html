<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>BRO.chat — AI Chat, Redefined</title>
    <meta name="description" content="BRO.chat is a next-gen AI chat platform powered by GPT-4. Start conversations, explore AI tools, and chat smarter — built by Metatron878." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- SPA routing: restore route from 404.html redirect -->
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          window.history.replaceState(null, null, window.location.pathname + p);
        }
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
